<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>QuickBooks AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body style="background-color:#f5feff;">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>QuickBooks AI Assistant</h3>

        </div>

        <div class="card-body">

            <h5 class="mb-3">
                Dashboard
            </h5>

                <div class="mt-3 mb-3">

    <h5>
        Company:
        <span class="text-primary"
              th:text="${companyName}"></span>
    </h5>

</div>

            <h6 class="mb-4">
                Pending Transactions:
                <span th:text="${#lists.size(transactions)}"></span>
            </h6>

            <div class="mb-3">

    <button class="btn btn-success me-2" id="selectAllBtn">
        Select All
    </button>

    <button class="btn btn-primary me-2" id="acceptSelectedBtn">
        Accept Selected
    </button>

    <button class="btn btn-info text-white" id="rememberSelectedBtn">
        Remember Selected
    </button>

</div>

<div id="successMessage"
     class="alert alert-success d-none"
     role="alert">
</div>

            <table class="table table-striped table-hover">

              <thead class="table-dark">

    <tr>

        <th style="width:40px;">
    <input type="checkbox" id="selectAllCheckbox">
</th>

        <th>Date</th>

        <th>Description</th>

        <th>Amount</th>

        <th>Suggested Account</th>

        <th>Status</th>

        <th style="width:340px;">Actions</th>

    </tr>

</thead>
      
<tbody>

<tr th:each="transaction : ${transactions}"
    th:attr="data-id=${transaction.id},
             data-description=${transaction.description},
             data-account=${transaction.suggestedCategory}">

    <td>
        <input type="checkbox"
               class="transaction-checkbox">
    </td>

    <td th:text="${transaction.transactionDate}"></td>

    <td th:text="${transaction.description}"></td>

    <td th:text="${transaction.amount}"></td>

    <td th:text="${transaction.chartOfAccount != null
        ? transaction.chartOfAccount.accountName
        : 'UNKNOWN'}"></td>

    <td th:text="${transaction.status}"></td>

    <td>

    <button
        class="btn btn-success btn-sm accept-btn">
        Accept Once
    </button>

   <button
    class="btn btn-primary btn-sm remember-btn">
    Remember
    </button>

    <select
        class="form-select form-select-sm change-account mt-2">

        <option value="">
            Change...
        </option>

        <option
            th:each="account : ${accounts}"
            th:value="${account.id}"
            th:text="${account.accountName}">
        </option>

    </select>

</td>
</tr>

                </tbody>
            
            </table>

            <div class="d-flex justify-content-between align-items-center mt-3">

    <a th:if="${currentPage > 0}"
       th:href="@{/dashboard(page=${currentPage - 1})}"
       class="btn btn-outline-primary">
        ← Previous
    </a>

<div class="text-center">

    <div>
        Page <span th:text="${currentPage + 1}"></span>
        of
        <span th:text="${totalPages}"></span>
    </div>

    <small class="text-muted">
        Showing
        <span th:text="${currentPage * 10 + 1}"></span>
        -
    <span th:text="${transactions.size() + currentPage * 10}"></span>
        of
        <span th:text="${totalTransactions}"></span>
        transactions
    </small>

</div>

    <a th:if="${currentPage + 1 < totalPages}"
       th:href="@{/dashboard(page=${currentPage + 1})}"
       class="btn btn-outline-primary">
        Next →
    </a>

</div>

        </div>

    </div>

</div>


<!-- Change Account Modal -->

<div class="modal fade"
     id="changeAccountModal"
     tabindex="-1">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5 class="modal-title">
                    Remember Transaction
                </h5>

                <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <p>
                    <strong>Transaction:</strong>
                    <span id="transactionDescription"></span>
                </p>

                <input
                        type="hidden"
                        id="transactionId">

                <label class="form-label">
                    Choose the account to remember
                </label>

                <select
                        class="form-select"
                        id="accountSelect">

                    <option
                            th:each="account : ${accounts}"
                            th:value="${account.id}"
                            th:text="${account.accountName}">
                    </option>

                </select>

            </div>

            <div class="modal-footer">

                <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Cancel

                </button>

              <button
    class="btn btn-success"
    id="saveOnceBtn">

    Save Once

</button>

<button
    class="btn btn-primary"
    id="rememberBtn">

    Remember

</button>

            </div>

        </div>

    </div>

</div>

<div class="toast-container position-fixed top-0 end-0 p-3">

    <div id="successToast"
         class="toast align-items-center text-bg-success border-0"
         role="alert"
         aria-live="assertive"
         aria-atomic="true">

        <div class="d-flex">

            <div class="toast-body" id="toastMessage">

                Success

            </div>

            <button type="button"
                    class="btn-close btn-close-white me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

<script src="/dashboard.js"></script>
</body>

</html>
